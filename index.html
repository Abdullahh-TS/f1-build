<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My project</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body class="dark">
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas"></canvas>
    </div>
    <div id="loading-cover" style="display:none;">
      <div id="unity-loading-bar">
        <div id="unity-logo"><img src="logo.png"></div>
        <div id="unity-progress-bar-empty" style="display: none;">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div class="spinner"></div>
      </div>
    </div>
    <div id="unity-fullscreen-button" style="display: none;"></div>
    <script>
      const hideFullScreenButton = "";
      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/a78a534454a38c6f96be495cac876094.loader.js";
      const orientationLockApi = (screen.orientation && screen.orientation.lock) ? screen.orientation : null;
      let pendingOrientationLock = null;

      window.UnityOrientationBridge = {
        lock(orientationValue) {
          pendingOrientationLock = orientationValue;
          if (!orientationLockApi) return;
          orientationLockApi.lock(orientationValue).catch(() => {
            // Browsers commonly require fullscreen/user-gesture for orientation lock.
          });
        },
        unlock() {
          pendingOrientationLock = null;
          if (!orientationLockApi || !orientationLockApi.unlock) return;
          orientationLockApi.unlock();
        }
      };

      document.addEventListener("fullscreenchange", () => {
        if (!pendingOrientationLock || !orientationLockApi) return;
        orientationLockApi.lock(pendingOrientationLock).catch(() => {});
      });

      const config = {
        dataUrl: buildUrl + "/8996911004c2091ae1a02cd4996dc238.data.gz",
        frameworkUrl: buildUrl + "/dd5aa4afe1011678321ce4fdab6aedcb.framework.js.gz",
        codeUrl: buildUrl + "/71432f1e7040fc290de1459511fd41a3.wasm.gz",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "My project",
        productVersion: "1",
      };

      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const loadingCover = document.querySelector("#loading-cover");
      const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const fullscreenButton = document.querySelector("#unity-fullscreen-button");
      const spinner = document.querySelector('.spinner');
      canvas.setAttribute("tabindex", "-1");

      const releaseLoadingOverlay = () => {
        loadingCover.style.display = "none";
        loadingCover.style.pointerEvents = "none";
      };

      const canFullscreen = (function() {
        for (const key of [
            'exitFullscreen',
            'webkitExitFullscreen',
            'webkitCancelFullScreen',
            'mozCancelFullScreen',
            'msExitFullscreen',
          ]) {
          if (key in document) {
            return true;
          }
        }
        return false;
      }());

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1;
      }
      loadingCover.style.display = "";

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          spinner.style.display = "none";
          progressBarEmpty.style.display = "";
          progressBarFull.style.width = `${100 * progress}%`;
        }).then((unityInstance) => {
          releaseLoadingOverlay();
          canvas.focus();
          document.addEventListener("pointerdown", () => canvas.focus(), { once: true, capture: true });
          if (canFullscreen) {
            if (!hideFullScreenButton) {
              fullscreenButton.style.display = "";
            }
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
